<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hypnograph | Starting Experience</title>
  <meta name="description" content="Loading Hypnograph...">
  <meta name="theme-color" content="#111318">
  <meta property="og:title" content="Hypnograph">
  <meta property="og:description" content="A memory-forward visual instrument that generates reflective outputs from your own photos and videos.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/hypnograph-hero-poster.jpg">
  <link rel="icon" href="assets/hypnograph-icon.png" type="image/png">
  <link rel="preconnect" href="https://iframe.videodelivery.net" crossorigin>
  <link rel="stylesheet" href="styles.css">
  <noscript><meta http-equiv="refresh" content="0;url=home.html"></noscript>
</head>
<body class="countdown-page">
  <main class="countdown-shell" aria-label="Hypnograph countdown intro">
    <div class="film-countdown" id="cinema-countdown" role="status" aria-live="polite">
      <div class="film-countdown-target">
        <span class="film-countdown-ring ring-outer" aria-hidden="true"></span>
        <span class="film-countdown-ring ring-inner" aria-hidden="true"></span>
        <span class="film-countdown-cross cross-horizontal" aria-hidden="true"></span>
        <span class="film-countdown-cross cross-vertical" aria-hidden="true"></span>
        <p class="film-countdown-value" id="cinema-countdown-value">3</p>
      </div>
    </div>
  </main>

  <iframe
    class="countdown-preload"
    title="Preload Hypnograph intro video"
    src="https://iframe.videodelivery.net/6948b43abd96d022bccc2228064ceecd?autoplay=true&muted=true&loop=true&controls=false&preload=true"
    loading="eager"
    allow="autoplay; encrypted-media; picture-in-picture"
    tabindex="-1"
    aria-hidden="true"
  ></iframe>

  <script>
    (function () {
      const overlay = document.getElementById("cinema-countdown");
      const valueNode = document.getElementById("cinema-countdown-value");
      const frames = ["3", "2", "1"];
      const stepMs = window.matchMedia("(prefers-reduced-motion: reduce)").matches ? 500 : 900;
      const requestedHash = window.location.hash || "";
      const redirectPath = `home.html${requestedHash}`;

      const warmPoster = new Image();
      warmPoster.src = "assets/hypnograph-hero-poster.jpg";
      fetch(redirectPath, { cache: "force-cache" }).catch(() => {});

      if (!overlay || !valueNode) {
        window.location.replace(redirectPath);
        return;
      }

      let index = 0;
      const tick = function () {
        if (index >= frames.length) {
          overlay.classList.add("is-finished");
          window.setTimeout(function () {
            window.location.replace(redirectPath);
          }, 420);
          return;
        }

        valueNode.textContent = frames[index];
        overlay.classList.remove("is-ticking");
        void overlay.offsetWidth;
        overlay.classList.add("is-ticking");
        index += 1;
        window.setTimeout(tick, stepMs);
      };

      tick();
    })();
  </script>
</body>
</html>
