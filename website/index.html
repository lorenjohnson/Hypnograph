<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>What Is Hypnograph</title>
  <meta name="description" content="Live view of /docs/collaborators.md">
  <meta name="theme-color" content="#0f1115">
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      font: 16px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #0f1115;
      color: #e6e8eb;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .status {
      margin: 0 0 12px;
      color: #a5acb8;
      font-size: 0.9rem;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="page">
    <p class="status" id="status">Loading /docs/collaborators.md...</p>
    <pre id="document"></pre>
  </main>
  <script>
    const statusEl = document.getElementById("status");
    const documentEl = document.getElementById("document");
    let lastText = "";
    const resolvedDocPath = resolveDocPath(window.location.pathname);

    function resolveDocPath(pathname) {
      const normalizedPath = pathname.replace(/\/+$/, "");

      if (normalizedPath === "" || normalizedPath === "/") {
        return "/docs/collaborators.md";
      }

      if (normalizedPath.startsWith("/docs/")) {
        return normalizedPath.endsWith(".md") ? normalizedPath : normalizedPath + ".md";
      }

      return "/docs" + (normalizedPath.endsWith(".md") ? normalizedPath : normalizedPath + ".md");
    }

    async function loadDoc() {
      try {
        const response = await fetch(resolvedDocPath + "?ts=" + Date.now(), { cache: "no-store" });
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        const text = await response.text();
        if (text !== lastText) {
          documentEl.textContent = text;
          lastText = text;
        }
        statusEl.textContent = "Live view of " + resolvedDocPath;
      } catch (error) {
        statusEl.textContent = "Unable to load " + resolvedDocPath + " (" + error.message + ")";
      }
    }

    loadDoc();
    setInterval(loadDoc, 1500);
  </script>
</body>
</html>
