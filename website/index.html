<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>What Is Hypnograph</title>
  <meta name="description" content="Live view of /docs/collaborators.md">
  <meta name="theme-color" content="#0f1115">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      font: 16px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #0f1115;
      color: #e6e8eb;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .status {
      margin: 0 0 12px;
      color: #a5acb8;
      font-size: 0.9rem;
    }
    .breadcrumb {
      margin: 0 0 12px;
      color: #a5acb8;
      font-size: 0.9rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      align-items: center;
    }
    .breadcrumb a {
      color: #a5acb8;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #dbe2f0;
      text-decoration: underline;
    }
    .breadcrumb-sep {
      opacity: 0.65;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .document h1,
    .document h2,
    .document h3,
    .document h4,
    .document h5,
    .document h6 {
      margin: 1.1em 0 0.5em;
      line-height: 1.25;
    }
    .document p,
    .document ul,
    .document ol,
    .document blockquote {
      margin: 0.8em 0;
    }
    .document code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95em;
    }
    .document pre code {
      display: block;
      overflow-x: auto;
      padding: 0.9rem;
      border-radius: 8px;
      background: #0b1220;
    }
    .document a {
      color: #86b7ff;
    }
    .document blockquote {
      border-left: 3px solid #2b3342;
      padding-left: 12px;
      color: #c6ccd8;
    }
    .document .contains-task-list {
      list-style: none;
      padding-left: 0;
    }
    .document .task-list-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .document .task-list-item input[type="checkbox"] {
      margin-top: 0.2rem;
      width: 1rem;
      height: 1rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
    <article class="document" id="document"></article>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists@2.1.1/dist/markdown-it-task-lists.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script>
    const breadcrumbEl = document.getElementById("breadcrumb");
    const documentEl = document.getElementById("document");
    let lastText = "";
    const resolvedDocPath = resolveDocPath(window.location.pathname);
    const markdownUtils = window.markdownit().utils;
    const markdown = window.markdownit({
      html: true,
      xhtmlOut: true,
      breaks: true,
      linkify: true,
      typographer: true,
      highlight(code, language) {
        if (window.hljs && language && window.hljs.getLanguage(language)) {
          try {
            return "<pre class=\"hljs\"><code>" + window.hljs.highlight(code, { language, ignoreIllegals: true }).value + "</code></pre>";
          } catch (_) {}
        }
        if (window.hljs) {
          try {
            return "<pre class=\"hljs\"><code>" + window.hljs.highlightAuto(code).value + "</code></pre>";
          } catch (_) {}
        }
        return "<pre><code>" + markdownUtils.escapeHtml(code) + "</code></pre>";
      }
    });
    markdown.use(window.markdownitTaskLists, {
      enabled: false
    });

    function stripFrontMatter(text) {
      const frontMatterPattern = /^---\r?\n[\s\S]*?\r?\n---(?:\r?\n|$)/;
      return text.replace(frontMatterPattern, "");
    }

    function resolveDocPath(pathname) {
      const normalizedPath = pathname.replace(/\/+$/, "");

      if (normalizedPath === "" || normalizedPath === "/") {
        return "/docs/collaborators.md";
      }

      if (normalizedPath.startsWith("/docs/")) {
        return normalizedPath.endsWith(".md") ? normalizedPath : normalizedPath + ".md";
      }

      return "/docs" + (normalizedPath.endsWith(".md") ? normalizedPath : normalizedPath + ".md");
    }

    function titleCaseSegment(segment) {
      return segment
        .replace(/\.md$/i, "")
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function renderBreadcrumb(pathname) {
      const normalizedPath = pathname.replace(/\/+$/, "");
      const routePath = normalizedPath === "" ? "/" : normalizedPath;
      const rawSegments = routePath === "/" ? [] : routePath.slice(1).split("/");
      const segments = rawSegments.map((segment) => titleCaseSegment(decodeURIComponent(segment)));

      breadcrumbEl.innerHTML = "";
      if (rawSegments.length === 0) {
        breadcrumbEl.style.display = "none";
        return;
      }
      breadcrumbEl.style.display = "flex";

      const homeLink = document.createElement("a");
      homeLink.href = "/";
      homeLink.textContent = "Home";
      breadcrumbEl.appendChild(homeLink);

      let cumulativePath = "";
      for (let i = 0; i < rawSegments.length; i += 1) {
        const separator = document.createElement("span");
        separator.className = "breadcrumb-sep";
        separator.textContent = "/";
        breadcrumbEl.appendChild(separator);

        cumulativePath += "/" + rawSegments[i];
        const segmentLabel = segments[i];
        if (i === rawSegments.length - 1) {
          const current = document.createElement("span");
          current.textContent = segmentLabel;
          breadcrumbEl.appendChild(current);
        } else {
          const link = document.createElement("a");
          link.href = cumulativePath;
          link.textContent = segmentLabel;
          breadcrumbEl.appendChild(link);
        }
      }
    }

    async function loadDoc() {
      try {
        const response = await fetch(resolvedDocPath + "?ts=" + Date.now(), { cache: "no-store" });
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        const text = await response.text();
        if (text !== lastText) {
          documentEl.innerHTML = markdown.render(stripFrontMatter(text));
          lastText = text;
        }
      } catch (error) {
        breadcrumbEl.innerHTML = "Unable to load " + resolvedDocPath + " (" + error.message + ")";
      }
    }

    renderBreadcrumb(window.location.pathname);
    loadDoc();
    setInterval(loadDoc, 1500);
  </script>
</body>
</html>
