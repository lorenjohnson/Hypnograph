<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>What Is Hypnograph</title>
  <meta name="description" content="Live view of /index.md and project docs from /docs">
  <meta name="theme-color" content="#0f1115">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #10141b;
      --bg-elev: #151b24;
      --text: #edf2fa;
      --muted: #c7d0de;
      --line: #2f3a4c;
      --link: #9dc0ff;
    }
    body {
      margin: 0;
      font: 17px/1.65 "Avenir Next", Avenir, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 12% 0%, #1b2433 0%, var(--bg) 42%), var(--bg);
      color: var(--text);
    }
    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px;
      box-sizing: border-box;
      position: relative;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin: 0 0 12px;
    }
    .topbar-main {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      min-width: 0;
      flex: 1 1 auto;
    }
    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .topbar-nav a,
    .topbar-nav span {
      color: var(--muted);
      text-decoration: none;
    }
    .topbar-nav a:hover {
      color: var(--text);
      text-decoration: underline;
    }
    .topbar-nav-sep {
      opacity: 0.55;
    }
    .topbar-nav-github {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .topbar-nav-github svg {
      width: 0.95rem;
      height: 0.95rem;
      fill: currentColor;
      flex: 0 0 auto;
    }
    .sidebar-toggle {
      width: 2rem;
      height: 2rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in oklab, var(--bg-elev), #000 6%);
      color: var(--text);
      font-size: 1.05rem;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .sidebar-toggle:hover {
      background: color-mix(in oklab, var(--bg-elev), #fff 4%);
    }
    .layout {
      display: block;
    }
    .status {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .breadcrumb {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      align-items: center;
    }
    .breadcrumb a {
      color: var(--muted);
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: var(--text);
      text-decoration: underline;
    }
    .breadcrumb-sep {
      opacity: 0.65;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .document h1,
    .document h2,
    .document h3,
    .document h4,
    .document h5,
    .document h6 {
      margin: 1.1em 0 0.5em;
      line-height: 1.25;
    }
    .document p,
    .document ul,
    .document ol,
    .document blockquote {
      margin: 0.8em 0;
    }
    .document code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95em;
    }
    .document pre code {
      display: block;
      overflow-x: auto;
      padding: 0.9rem;
      border-radius: 8px;
      background: #111827;
    }
    .document a {
      color: var(--link);
    }
    .document blockquote {
      border-left: 3px solid var(--line);
      padding-left: 12px;
      color: var(--muted);
    }
    .document .contains-task-list {
      list-style: none;
      padding-left: 0;
    }
    .document .task-list-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .document .task-list-item input[type="checkbox"] {
      margin-top: 0.2rem;
      width: 1rem;
      height: 1rem;
    }
    .document .collab-hero {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 0.1rem 0 1rem;
    }
    .document .collab-hero-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--bg-elev);
      object-fit: cover;
      flex: 0 0 auto;
    }
    .document .collab-hero-text {
      min-width: 0;
    }
    .document .collab-hero-title {
      margin: 0;
      color: var(--text);
      font-size: clamp(2rem, 4vw, 2.7rem);
      line-height: 1.05;
      letter-spacing: 0.01em;
    }
    .document .collab-hero-kicker {
      margin: 0.25rem 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      letter-spacing: 0.01em;
    }
    .document .beta-inset,
    .document .use-case-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #1a2230 0%, #151c28 100%);
      padding: 1.25rem 1.35rem;
      margin: 0.9rem 0 1rem;
    }
    .document .beta-grid {
      clear: both;
      margin-top: 0.7rem;
    }
    .document .beta-inset {
      margin: 0;
    }
    .document .beta-download {
      border-color: #415a82;
      background: linear-gradient(180deg, #202f44 0%, #182537 100%);
      box-shadow: 0 10px 28px rgba(9, 18, 33, 0.28);
      padding: 0.9rem 0.95rem;
    }
    .document .beta-download p {
      margin: 0.45rem 0;
    }
    .document .beta-download .download-button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      margin: 0 0 0.5rem;
      padding: 0.56rem 0.86rem;
      border-radius: 9px;
      border: 1px solid #8fb0ea;
      background: linear-gradient(180deg, #96b7f5 0%, #739ce2 100%);
      color: #f7fbff;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 8px 18px rgba(54, 88, 148, 0.38);
    }
    .document .beta-download .download-button:hover {
      background: linear-gradient(180deg, #a3c2fb 0%, #7ea5e8 100%);
      text-decoration: none;
    }
    .document .beta-download .download-subtext {
      margin: 0.22rem 0;
      font-size: 0.86rem;
      color: #c5d2e5;
      line-height: 1.4;
    }
    .document .beta-download .download-subtext:has(.download-chip) {
      display: flex;
      flex-wrap: wrap;
      gap: 0.28rem;
      align-items: center;
    }
    .document .beta-download .download-subtext code {
      font-size: 0.78rem;
    }
    .document .beta-download .download-chip {
      display: inline-block;
      margin: 0.08rem 0.18rem 0.08rem 0;
      padding: 0.18rem 0.44rem;
      border-radius: 999px;
      border: 1px solid #5a7398;
      background: rgba(18, 32, 52, 0.56);
      color: #d5e3f8;
      font-size: 0.72rem;
      letter-spacing: 0.01em;
    }
    .document .beta-demo {
      border-color: #3a4f72;
      background: linear-gradient(180deg, #1b283d 0%, #141f31 100%);
      margin-top: 0.9rem;
    }
    .document .download-cta {
      float: right;
      width: clamp(235px, 25%, 285px);
      margin: 0 0 0.9rem 1rem;
    }
    .document .beta-demo h3,
    .document .beta-download h3 {
      margin-bottom: 0.7rem;
    }
    .document .beta-demo .video-thumbnail-button {
      margin-top: 0.2rem;
    }
    .document .video-thumbnail-button {
      position: relative;
      width: 100%;
      padding: 0;
      border: 1px solid #34425b;
      border-radius: 10px;
      background: #101724;
      overflow: hidden;
      cursor: pointer;
    }
    .document .video-thumbnail-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      object-fit: cover;
      opacity: 0.92;
    }
    .document .video-thumbnail-play {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255, 255, 255, 0.55);
      background: rgba(8, 12, 20, 0.5);
      border-radius: 999px;
      width: 3rem;
      height: 3rem;
      backdrop-filter: blur(2px);
    }
    .document .video-thumbnail-play::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-40%, -50%);
      width: 0;
      height: 0;
      border-top: 0.5rem solid transparent;
      border-bottom: 0.5rem solid transparent;
      border-left: 0.78rem solid #f3f7ff;
    }
    .document .video-lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(6, 10, 16, 0.8);
      padding: 1rem;
      z-index: 1500;
    }
    .document .video-lightbox.is-open {
      display: flex;
    }
    .document .video-lightbox-panel {
      position: relative;
      width: min(1100px, 94vw);
    }
    .document .video-lightbox-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 6px;
      display: block;
      background: #0a1019;
    }
    .document .video-lightbox-close {
      position: absolute;
      right: -0.2rem;
      top: -2.2rem;
      border: 0;
      background: transparent;
      color: #ffffff;
      font-size: 2rem;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
    }
    .document .beta-inset h3,
    .document .use-case-card h3 {
      margin-top: 0.2rem;
    }
    .document .use-case-card h2 {
      margin-top: 0.1rem;
      font-size: 1.15rem;
    }
    .docs-sidebar {
      display: none;
      position: sticky;
      top: 16px;
      align-self: start;
      max-height: calc(100vh - 32px);
      overflow: auto;
      border-right: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px 12px 8px;
      box-sizing: border-box;
      background: color-mix(in oklab, var(--bg-elev), #000 14%);
    }
    body.docs-sidebar-open .layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }
    body.docs-sidebar-open .docs-sidebar {
      display: block;
      grid-column: 1;
      grid-row: 1;
    }
    body.docs-sidebar-open .document {
      grid-column: 2;
      grid-row: 1;
    }
    body.homepage-route .docs-sidebar {
      display: none !important;
    }
    body.homepage-route .topbar {
      position: absolute;
      top: 24px;
      right: 16px;
      justify-content: flex-end;
      margin: 0;
      z-index: 20;
    }
    body.homepage-route .topbar-main {
      display: none;
    }
    .docs-tree ul {
      list-style: none;
      margin: 0;
      padding-left: 14px;
    }
    .docs-tree li {
      margin: 0.15rem 0;
    }
    .docs-tree details > summary {
      cursor: pointer;
      color: var(--muted);
      user-select: none;
      list-style: none;
      font-size: 0.86rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .docs-tree details > summary::-webkit-details-marker {
      display: none;
    }
    .docs-tree details > summary::before {
      content: "📁";
      font-size: 0.9rem;
      line-height: 1;
    }
    .docs-tree details[open] > summary::before {
      content: "📂";
    }
    .docs-tree details > summary:hover {
      color: var(--text);
    }
    .docs-tree a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.84rem;
      display: inline-flex;
      align-items: center;
      gap: 0.32rem;
    }
    .docs-tree a::before {
      content: "📄";
      font-size: 0.85rem;
      line-height: 1;
    }
    .docs-tree a:hover {
      text-decoration: underline;
      color: var(--text);
    }
    .docs-tree a.active {
      color: #ffffff;
      font-weight: 600;
    }
    .docs-tree-empty {
      color: #8f98aa;
      font-size: 0.9rem;
      margin: 0;
    }
    @media (max-width: 960px) {
      body.docs-sidebar-open .layout {
        display: block;
      }
      body.docs-sidebar-open .docs-sidebar {
        display: block;
        position: static;
        max-height: none;
        margin-bottom: 1rem;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding-right: 0;
        padding-bottom: 0.8rem;
      }
      .document .collab-hero-icon {
        width: 56px;
        height: 56px;
      }
      .document .beta-inset,
      .document .use-case-card {
        padding: 1rem 1.05rem;
      }
      .document .beta-grid {
        clear: both;
      }
      .document .download-cta {
        float: none;
        width: auto;
        margin: 0.2rem 0 1rem;
      }
      .document .beta-download .download-button {
        width: 100%;
        margin: 0 0 0.55rem;
      }
      .document .video-lightbox-panel {
        width: 96vw;
      }
      .document .video-lightbox-close {
        right: 0;
        top: -2rem;
      }
      body.homepage-route .topbar {
        position: static;
        margin-bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="topbar-main">
        <button type="button" class="sidebar-toggle" id="docs-sidebar-toggle" aria-label="Toggle docs sidebar" aria-expanded="false">☰</button>
        <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
      </div>
      <nav class="topbar-nav" id="topbar-nav" aria-label="Site Navigation"></nav>
    </div>
    <div class="layout">
      <article class="document" id="document"></article>
      <aside class="docs-sidebar" id="docs-sidebar" aria-label="Docs Sidebar">
        <nav class="docs-tree" id="docs-tree" aria-label="Docs Tree"></nav>
      </aside>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists@2.1.1/dist/markdown-it-task-lists.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
