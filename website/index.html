<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>What Is Hypnograph</title>
  <meta name="description" content="Live view of /docs/collaborators.md">
  <meta name="theme-color" content="#0f1115">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      font: 16px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #0f1115;
      color: #e6e8eb;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
      box-sizing: border-box;
    }
    .layout {
      display: block;
    }
    .status {
      margin: 0 0 12px;
      color: #a5acb8;
      font-size: 0.9rem;
    }
    .breadcrumb {
      margin: 0 0 12px;
      color: #a5acb8;
      font-size: 0.9rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      align-items: center;
    }
    .breadcrumb a {
      color: #a5acb8;
      text-decoration: none;
    }
    .breadcrumb a:hover {
      color: #dbe2f0;
      text-decoration: underline;
    }
    .breadcrumb-sep {
      opacity: 0.65;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .document h1,
    .document h2,
    .document h3,
    .document h4,
    .document h5,
    .document h6 {
      margin: 1.1em 0 0.5em;
      line-height: 1.25;
    }
    .document p,
    .document ul,
    .document ol,
    .document blockquote {
      margin: 0.8em 0;
    }
    .document code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.95em;
    }
    .document pre code {
      display: block;
      overflow-x: auto;
      padding: 0.9rem;
      border-radius: 8px;
      background: #0b1220;
    }
    .document a {
      color: #86b7ff;
    }
    .document blockquote {
      border-left: 3px solid #2b3342;
      padding-left: 12px;
      color: #c6ccd8;
    }
    .document .contains-task-list {
      list-style: none;
      padding-left: 0;
    }
    .document .task-list-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .document .task-list-item input[type="checkbox"] {
      margin-top: 0.2rem;
      width: 1rem;
      height: 1rem;
    }
    .docs-sidebar {
      display: none;
    }
    body.homepage-route .page {
      padding-right: 360px;
    }
    body.homepage-route .docs-sidebar {
      display: block;
      position: fixed;
      top: 0;
      right: max(16px, calc((100vw - 1200px) / 2 + 16px));
      width: 320px;
      height: 100vh;
      overflow: auto;
      border-left: 1px solid #232a39;
      padding: 16px 0 24px 16px;
      box-sizing: border-box;
      background: #0f1115;
      z-index: 10;
    }
    .docs-tree ul {
      list-style: none;
      margin: 0;
      padding-left: 14px;
    }
    .docs-tree li {
      margin: 0.15rem 0;
    }
    .docs-tree details > summary {
      cursor: pointer;
      color: #c3cad7;
      user-select: none;
    }
    .docs-tree details > summary:hover {
      color: #e7edf9;
    }
    .docs-tree a {
      color: #aeb7c8;
      text-decoration: none;
    }
    .docs-tree a:hover {
      text-decoration: underline;
      color: #e7edf9;
    }
    .docs-tree a.active {
      color: #ffffff;
      font-weight: 600;
    }
    .docs-tree-empty {
      color: #8f98aa;
      font-size: 0.9rem;
      margin: 0;
    }
    @media (max-width: 960px) {
      body.homepage-route .page {
        padding-right: 16px;
      }
      body.homepage-route .docs-sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
    <div class="layout">
      <article class="document" id="document"></article>
      <aside class="docs-sidebar" id="docs-sidebar" aria-label="Docs Sidebar">
        <nav class="docs-tree" id="docs-tree" aria-label="Docs Tree"></nav>
      </aside>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists@2.1.1/dist/markdown-it-task-lists.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
